# OpenOCD config for Digilent HS3 + Arty A7-100T (external cable)
# Usage:
#   openocd -f openocd/arty_a7_hs3.cfg
# Host CLI example:
#   python -m host.fcapz.cli --backend openocd --host 127.0.0.1 --port 6666 --tap xc7a100t.tap probe
#
# Notes:
# - This tries both common OpenOCD HS3 interface script names.
# - Ensure HS3 USB driver is WinUSB/libusb-compatible for OpenOCD.

if {[catch {source [find interface/ftdi/digilent_hs3.cfg]}]} {
    source [find interface/ftdi/digilent_jtag_hs3.cfg]
}

transport select jtag
adapter speed 10000

set _CHIPNAME xc7a100t
set _IDCODE 0x13631093

jtag newtap $_CHIPNAME tap -irlen 6 -expected-id $_IDCODE

init
