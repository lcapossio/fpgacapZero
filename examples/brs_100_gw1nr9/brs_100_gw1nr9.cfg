adapter driver ftdi
ftdi vid_pid 0x0403 0x6010
ftdi channel 0
transport select jtag
adapter speed 5000

set _CHIPNAME GW1NR-9C
set _IDCODE   0x1100481B

jtag newtap $_CHIPNAME tap -irlen 8 -expected-id $_IDCODE
init
