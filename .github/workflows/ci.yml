name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel in-progress runs on the same branch when a new push lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 0. Version sync guard ──────────────────────────────────────────
  # Catches the "I bumped VERSION but forgot to regenerate
  # rtl/fcapz_version.vh" foot-gun before any other job wastes minutes.
  version-sync:
    name: VERSION ↔ rtl/fcapz_version.vh in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify fcapz_version.vh is regenerated from VERSION
        run: python tools/sync_version.py --check

  # ── 1. Python lint ────────────────────────────────────────────────
  lint-python:
    name: Python lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install "ruff>=0.4.0,<0.13"
      - name: ruff check (whole repo)
        run: ruff check .

  # ── 2. Package install + import smoke test ────────────────────────
  install-smoke:
    name: pip install -e . + import fcapz
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Editable install
        run: pip install -e ".[dev]"
      - name: Verify top-level fcapz package resolves
        run: |
          python -c "
          import fcapz
          from fcapz import (
              Analyzer, CaptureConfig, TriggerConfig, ProbeSpec, SequencerStage,
              CaptureResult, Transport, OpenOcdTransport, XilinxHwServerTransport,
              VendorStubTransport,
              find_edges, find_rising_edges, find_falling_edges, find_bursts,
              frequency_estimate, summarize, ProbeDefinition,
              EioController, EjtagAxiController, AXIError, EjtagUartController,
          )
          print('all top-level fcapz exports importable')
          "
      - name: Verify fcapz CLI entry point is on PATH
        run: |
          fcapz --help | head -5

  # ── 3. Host unit tests (full suite, all tests/) ───────────────────
  test-host:
    name: Host unit tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install iverilog (needed by test_rtl_fifo_equiv)
        run: sudo apt-get install -y iverilog
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Run full unit test suite
        run: pytest tests/ -v --tb=short

  # ── 4. RTL elaboration (iverilog -Wall) ──────────────────────────
  lint-rtl:
    name: RTL elaboration (iverilog -Wall)
    runs-on: ubuntu-latest
    env:
      # -I rtl is required so `include "fcapz_version.vh"` resolves
      IVFLAGS: "-Wall -g2012 -I rtl -y rtl -y rtl/jtag_tap -y sim sim/bscane2_stub.v sim/xpm_fifo_async_stub.v"
    steps:
      - uses: actions/checkout@v4
      - name: Install iverilog
        run: sudo apt-get install -y iverilog

      # Core modules
      - name: Lint dpram.v
        run: iverilog $IVFLAGS -o /dev/null rtl/dpram.v
      - name: Lint trig_compare.v
        run: iverilog $IVFLAGS -o /dev/null rtl/trig_compare.v
      - name: Lint jtag_reg_iface.v
        run: iverilog $IVFLAGS -o /dev/null rtl/jtag_reg_iface.v
      - name: Lint jtag_burst_read.v
        run: iverilog $IVFLAGS -o /dev/null rtl/jtag_burst_read.v
      - name: Lint fcapz_async_fifo.v
        run: iverilog $IVFLAGS -o /dev/null rtl/fcapz_async_fifo.v

      # ELA core + Xilinx wrapper
      - name: Lint fcapz_ela.v
        run: iverilog $IVFLAGS -o /dev/null rtl/fcapz_ela.v
      - name: Lint fcapz_ela_xilinx7.v (wrapper)
        run: iverilog $IVFLAGS -o /dev/null rtl/fcapz_ela_xilinx7.v

      # EIO core + Xilinx wrapper
      - name: Lint fcapz_eio.v
        run: iverilog $IVFLAGS -o /dev/null rtl/fcapz_eio.v
      - name: Lint fcapz_eio_xilinx7.v (wrapper)
        run: iverilog $IVFLAGS -o /dev/null rtl/fcapz_eio_xilinx7.v

      # EJTAG-AXI bridge core + Xilinx wrapper
      - name: Lint fcapz_ejtagaxi.v
        run: iverilog $IVFLAGS -o /dev/null rtl/fcapz_ejtagaxi.v
      - name: Lint fcapz_ejtagaxi_xilinx7.v (wrapper)
        run: iverilog $IVFLAGS -o /dev/null rtl/fcapz_ejtagaxi_xilinx7.v

      # EJTAG-UART bridge core + Xilinx wrapper (was missing pre-CI tightening)
      - name: Lint fcapz_ejtaguart.v
        run: iverilog $IVFLAGS -o /dev/null rtl/fcapz_ejtaguart.v
      - name: Lint fcapz_ejtaguart_xilinx7.v (wrapper)
        run: iverilog $IVFLAGS -o /dev/null rtl/fcapz_ejtaguart_xilinx7.v

      # Xilinx UltraScale / UltraScale+ wrappers (added v0.3.0).  Same
      # BSCANE2 primitive as 7-series; lint via the same stub so we can
      # at least confirm the wrappers elaborate without a vendor install.
      - name: Lint jtag_tap_xilinxus.v (UltraScale TAP)
        run: iverilog $IVFLAGS -o /dev/null rtl/jtag_tap/jtag_tap_xilinxus.v
      - name: Lint fcapz_ela_xilinxus.v (UltraScale wrapper)
        run: iverilog $IVFLAGS -o /dev/null rtl/fcapz_ela_xilinxus.v
      - name: Lint fcapz_eio_xilinxus.v (UltraScale wrapper)
        run: iverilog $IVFLAGS -o /dev/null rtl/fcapz_eio_xilinxus.v
      - name: Lint fcapz_ejtagaxi_xilinxus.v (UltraScale wrapper)
        run: iverilog $IVFLAGS -o /dev/null rtl/fcapz_ejtagaxi_xilinxus.v
      - name: Lint fcapz_ejtaguart_xilinxus.v (UltraScale wrapper)
        run: iverilog $IVFLAGS -o /dev/null rtl/fcapz_ejtaguart_xilinxus.v

  # ── 5. RTL simulation (iverilog + vvp) ───────────────────────────
  sim:
    name: RTL simulation (iverilog + vvp)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install iverilog
        run: sudo apt-get install -y iverilog
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run all RTL testbenches
        run: python sim/run_sim.py
